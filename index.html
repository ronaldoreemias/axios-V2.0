<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logotipo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google-site-verification" content="b_6istV0Lw9g5OvVjYdTlpgmXOLAROqhkvjNh_uOz1A" />
  
  <!-- Meta Tags Dinâmicas via JavaScript para crawlers -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "axiosnews",
      "url": "https://axiosnoticias.vercel.app",
      "description": "Fique por dentro das últimas notícias, vagas de emprego e oportunidades no e-commerce",
      "publisher": {
        "@type": "Organization",
        "name": "axiosnews",
        "logo": {
          "@type": "ImageObject",
          "url": "https://axiosnoticias.vercel.app/logotipo.png"
        }
      }
    }
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  
  <!-- Script para detectar artigo e buscar meta tags dinâmicas -->
  <script>
    (function() {
      const path = window.location.pathname;
      const match = path.match(/\/postagensgeral\/([a-f0-9]{24})/);
      
      if (match) {
        const postId = match[1];
        console.log('Detectada página de artigo:', postId);
        
        // Buscar meta tags da API
        fetch(`https://backendpostagens.vercel.app/api/handler?type=postagensgeral&id=${postId}`)
          .then(response => response.json())
          .then(postagem => {
            console.log('Postagem carregada para meta tags:', postagem.titulo);
            
            // Atualizar meta tags
            document.title = `${postagem.titulo} | axiosnews`;
            
            // Criar ou atualizar meta tags
            const createOrUpdateMeta = (attr, name, content) => {
              let meta = document.querySelector(`meta[${attr}="${name}"]`);
              if (!meta) {
                meta = document.createElement('meta');
                meta.setAttribute(attr, name);
                document.head.appendChild(meta);
              }
              meta.setAttribute('content', content);
            };
            
            createOrUpdateMeta('name', 'description', postagem.descricao);
            createOrUpdateMeta('property', 'og:title', postagem.titulo);
            createOrUpdateMeta('property', 'og:description', postagem.descricao);
            createOrUpdateMeta('property', 'og:image', postagem.imagem);
            createOrUpdateMeta('property', 'og:url', window.location.href);
            createOrUpdateMeta('property', 'og:type', 'article');
            createOrUpdateMeta('property', 'article:published_time', postagem.dataHora);
            createOrUpdateMeta('property', 'article:author', postagem.autor);
            createOrUpdateMeta('property', 'article:section', postagem.categoria);
            
            createOrUpdateMeta('name', 'twitter:card', 'summary_large_image');
            createOrUpdateMeta('name', 'twitter:title', postagem.titulo);
            createOrUpdateMeta('name', 'twitter:description', postagem.descricao);
            createOrUpdateMeta('name', 'twitter:image', postagem.imagem);
            
            // Canonical
            let canonical = document.querySelector('link[rel="canonical"]');
            if (!canonical) {
              canonical = document.createElement('link');
              canonical.setAttribute('rel', 'canonical');
              document.head.appendChild(canonical);
            }
            canonical.setAttribute('href', window.location.href);
            
            // Schema.org para artigo
            const articleSchema = document.createElement('script');
            articleSchema.type = 'application/ld+json';
            articleSchema.textContent = JSON.stringify({
              "@context": "https://schema.org",
              "@type": "NewsArticle",
              "headline": postagem.titulo,
              "description": postagem.descricao,
              "image": postagem.imagem,
              "datePublished": postagem.dataHora,
              "dateModified": postagem.dataHora,
              "author": {
                "@type": "Person",
                "name": postagem.autor
              },
              "publisher": {
                "@type": "Organization",
                "name": "axiosnews",
                "logo": {
                  "@type": "ImageObject",
                  "url": "https://axiosnoticias.vercel.app/logotipo.png"
                }
              },
              "mainEntityOfPage": {
                "@type": "WebPage",
                "@id": window.location.href
              }
            });
            document.head.appendChild(articleSchema);
            
            console.log('Meta tags atualizadas para artigo');
          })
          .catch(err => {
            console.error('Erro ao buscar meta tags:', err);
          });
      } else {
        // Meta tags padrão para home
        document.title = 'axiosnews | Notícias | Vagas | E-Commerce';
        console.log('Página inicial - usando meta tags padrão');
      }
    })();
  </script>
</body>
</html>
